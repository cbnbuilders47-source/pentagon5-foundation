---
name: Foundation validation

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: foundation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-contract:
    name: Repository contract
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Validate Milestone 1 shape
        shell: bash
        run: |
          set -euo pipefail
          required=(
            .dockerignore
            .editorconfig
            .env.example
            .gitignore
            .markdownlint-cli2.jsonc
            .github/CODEOWNERS
            .github/dependabot.yml
            .github/workflows/foundation.yml
            .github/workflows/security.yml
            .pre-commit-config.yaml
            .python-version
            Makefile
            README.md
            SECURITY.md
            apps/admin-console/README.md
            apps/macos-desktop/README.md
            docker-compose.yml
            docs/api/README.md
            docs/architecture/SYSTEM_CONTEXT.md
            docs/architecture/REPOSITORY.md
            docs/security/FOUNDATION.md
            docs/deployment/LOCAL_DEVELOPMENT.md
            docs/deployment/MACOS_TOOLCHAIN.md
            docs/testing/STRATEGY.md
            docs/operations/MILESTONE_1.md
            infrastructure/database/README.md
            infrastructure/deployment/README.md
            infrastructure/docker/otel/collector.yml
            infrastructure/docker/postgres/init/.gitkeep
            infrastructure/docker/prometheus/prometheus.yml
            infrastructure/monitoring/README.md
            infrastructure/scripts/doctor.sh
            infrastructure/scripts/stack-health.sh
            packages/api-client/README.md
            packages/event-contracts/README.md
            packages/shared-types/README.md
            packages/test-fixtures/README.md
            packages/theme-system/README.md
            packages/ui-components/README.md
            pyproject.toml
            services/api-gateway/README.md
            services/audit-service/README.md
            services/authentication/README.md
            services/instrument-master/README.md
            services/market-data/README.md
            services/notification-service/README.md
            services/order-router/README.md
            services/reconciliation/README.md
            services/reporting/README.md
            services/risk-engine/README.md
            services/signal-allocator/README.md
            services/strategy-engine/README.md
            tests/contract/.gitkeep
            tests/contract/test_repository_contract.py
            tests/end-to-end/.gitkeep
            tests/integration/.gitkeep
            tests/security/.gitkeep
            uv.lock
          )
          ((${#required[@]} == 58)) || {
            echo "::error::Internal contract must contain exactly 58 paths"
            exit 1
          }
          for path in "${required[@]}"; do
            test -s "$path" || {
              if [[ "$path" == *.gitkeep ]]; then
                test -f "$path" && continue
              fi
              echo "::error file=$path::Required Milestone 1 file is missing or empty"
              exit 1
            }
          done
          mapfile -t expected < <(printf '%s\n' "${required[@]}" | sort)
          mapfile -t actual < <(git ls-files | sort)
          if ! diff -u \
            <(printf '%s\n' "${expected[@]}") \
            <(printf '%s\n' "${actual[@]}"); then
            echo "::error::Repository does not match the exact 58-file contract"
            exit 1
          fi

      - name: Validate documentation contract
        shell: bash
        run: |
          set -euo pipefail
          headings=(
            "Objectives"
            "Files"
            "Commands"
            "Tests"
            "Results"
            "Known issues"
            "Security"
            "Acceptance"
            "Next milestone"
          )
          documents=(
            docs/architecture/SYSTEM_CONTEXT.md
            docs/architecture/REPOSITORY.md
            docs/security/FOUNDATION.md
            docs/deployment/LOCAL_DEVELOPMENT.md
            docs/deployment/MACOS_TOOLCHAIN.md
            docs/testing/STRATEGY.md
            docs/operations/MILESTONE_1.md
          )
          for document in "${documents[@]}"; do
            for heading in "${headings[@]}"; do
              if ! grep -Fqx "## $heading" "$document"; then
                echo "::error file=$document::Missing required heading: $heading"
                exit 1
              fi
            done
          done

  static-validation:
    name: TOML, YAML, Markdown, and shell
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pinned validation tooling
        run: python -m pip install --disable-pip-version-check pre-commit==4.2.0

      - name: Validate all tracked files
        env:
          SKIP: compose-config
        run: pre-commit run --all-files --show-diff-on-failure

      - name: Parse every TOML document
        shell: bash
        run: |
          set -euo pipefail
          mapfile -d '' files < <(find . -type f -name '*.toml' -not -path './.git/*' -print0)
          if ((${#files[@]} == 0)); then
            echo "No TOML files exist in Milestone 1."
            exit 0
          fi
          python - "${files[@]}" <<'PY'
          import pathlib
          import sys
          import tomllib

          for argument in sys.argv[1:]:
              path = pathlib.Path(argument)
              with path.open("rb") as stream:
                  tomllib.load(stream)
              print(f"valid TOML: {path}")
          PY

  dependency-health:
    name: Compose dependency health
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Validate and start declared dependencies
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t candidates < <(
            find . -maxdepth 2 -type f \
              \( -name 'compose.yml' -o -name 'compose.yaml' \
              -o -name 'docker-compose.yml' -o -name 'docker-compose.yaml' \) \
              -not -path './.git/*' | sort
          )
          if ((${#candidates[@]} == 0)); then
            echo "::error::Required Compose definition is missing"
            exit 1
          fi
          if ((${#candidates[@]} != 1)); then
            echo "::error::Expected one Compose file, found ${#candidates[@]}"
            exit 1
          fi

          compose_file="${candidates[0]}"
          docker compose -f "$compose_file" config --quiet
          trap 'docker compose -f "$compose_file" down --volumes --remove-orphans' EXIT
          docker compose -f "$compose_file" up --detach --wait --wait-timeout 120
          docker compose -f "$compose_file" ps

          mapfile -t containers < <(docker compose -f "$compose_file" ps --quiet)
          ((${#containers[@]} > 0)) || {
            echo "::error::Compose started no dependency containers"
            exit 1
          }
          health_format='{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}'
          for container in "${containers[@]}"; do
            status="$(docker inspect --format '{{.State.Status}}' "$container")"
            health="$(docker inspect --format "$health_format" "$container")"
            test "$status" = "running" || {
              echo "::error::Container $container is $status"
              exit 1
            }
            test "$health" = "healthy" || {
              echo "::error::Container $container has health status $health"
              exit 1
            }
          done
